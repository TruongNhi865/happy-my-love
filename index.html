<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday ❤️</title>
    <style>
      * {
        font-family: "Times New Roman", Times, serif;
      }
      body {
        margin: 0;

        color: rgb(7, 7, 7);
        font-family: Arial;
        text-align: center;
        overflow: hidden;
      }

      h1 {
        font-family: "Pacifico", cursive;
        color: #ff4d88;
        margin-top: 20%;
        font-size: 40px;
      }

      .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh);
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh);
          opacity: 0;
        }
      }

      #message {
        margin: 20px auto;
        font-size: 24px;
        max-width: 90%px;
        line-height: 1.6;
        text-align: center;
        word-wrap: break-word;

        background: rgba(255, 192, 203, 0.2);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
      }

      button {
        padding: 10px 20px;
        font-size: 18px;
        background: pink;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>🎂 Happy Birthday Em Yêu Quỳnh Như❤️</h1>
    <button onclick="start()">Như iu bấm vào đây nè 💖</button>
    <img
      id="avatar"
      src="nhac/z6644714474858_da5317f191eef6ddff05f738933d684d.jpg"
      alt="My Love"
      style="display: none"
    />
    <div id="message"></div>

    <audio id="music" src="nhac/Năm Thứ Năm.mp3"></audio>

    <script>
      function start() {
        document.getElementById("music").play();

        typeText(
          "Chúc cục cưng của em tuổi mới nhiều thành công trong công việc, nhiều sức khỏe và đạt được nhiều thành tựu hơn nữa trong cuộc sống. Em Beo yêu Như Meo nhiều lắmmm ❤️",
        );

        setInterval(createHeart, 300);
      }

      function typeText(text) {
        let i = 0;
        let msg = document.getElementById("message");
        msg.innerHTML = "";

        let interval = setInterval(() => {
          msg.innerHTML += text[i];
          i++;
          if (i >= text.length) clearInterval(interval);
        }, 50);
      }

      function createHeart() {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 10 + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 5000);
      }
    </script>
  </body>
</html>
